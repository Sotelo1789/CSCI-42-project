{% extends "base.html" %}
{% load humanize %}

{% block title %}Create Response to {{ cr.title }}{% endblock %}

{% block content %}
<h1>Responding to {{ cr.title }}</h1>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Create Response</button>
</form>
{% endblock %}
